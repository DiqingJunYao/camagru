<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>camagru</title>
    <link rel="stylesheet" href="style/style.css" />
    <script type="module" src="script/script.js" defer></script>
  </head>
  <body>
    <section class="container">
      <header>
        <div class="logo_login_container">
          <div class="logo_container">
            <div class="logo">logo</div>
            <h1>camagru</h1>
          </div>
          <div class="login_container">
            <button id="login">login</button>
            <button id="register">register</button>
            <button id="logout">logout</button>
            <button id="settings">settings</button>
          </div>
        </div>
      </header>
      <main>
        <div class="main_container">
          <nav>
            <div id="upload_images">Upload images</div>
            <div>part two</div>
            <div>part three</div>
            <div>part four</div>
          </nav>
          <div class="main_container_gallery"></div>
        </div>
        <div class="main_side">
          <div class="main_side_page">
            <button id="previous_page">previous</button>
            <div id="page_numbers">
              <button id="page_1">1</button>
              <label for="">...</label>
              <button id="last_page">last</button>
            </div>
            <button id="next_page">next</button>
          </div>
          <div class="main_side_gallery"></div>
        </div>
      </main>
      <footer>this is footer</footer>
    </section>
  </body>
</html>
